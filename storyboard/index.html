</head>
<body>
<h1>Storyboard Planning Calculator</h1>
<p>Estimate storyboard duration.</p>

<label>Scenes:</label><input id="scenes" type="number"><br>
<label>Avg seconds per scene:</label><input id="sec" type="number"><br>

<button onclick="calc()">Calculate</button>
<p id="res"></p>

<script>
function calc(){
let s=+document.getElementById('scenes').value||0;
let sec=+document.getElementById('sec').value||0;
let total=s*sec/60;
document.getElementById('res').innerText="Estimated runtime: "+total.toFixed(2)+" minutes";
}
</script>

</body></html>
