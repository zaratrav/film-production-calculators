<body>
<h1>Shooting Days Calculator</h1>

<label>Total scenes:</label><input id="scenes" type="number"><br>
<label>Scenes per day:</label><input id="spd" type="number"><br>

<button onclick="calc()">Calculate</button>
<p id="res"></p>

<script>
function calc(){
let s=+document.getElementById('scenes').value||0;
let spd=+document.getElementById('spd').value||1;
document.getElementById('res').innerText="Estimated days: "+Math.ceil(s/spd);
}
</script>

</body></html>
